name: Matrícula Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar script
        env:
            TOKEN: ${{ secrets.TOKEN }}
            CHAT_ID: ${{ secrets.CHAT_ID }}
            MATRICULA: ${{ secrets.MATRICULA }}
            DATANASCIMENTO: ${{ secrets.DATANASCIMENTO }}
            NOMEALUNO: ${{ secrets.NOMEALUNO }}
            NOMEMAE: ${{ secrets.NOMEMAE }}
            INDEXANO: ${{ secrets.INDEXANO }}
            INDEXMUNICIPIO: ${{ secrets.INDEXMUNICIPIO }}
            INDEXBAIRRO: ${{ secrets.INDEXBAIRRO }}
        run: python main.py
