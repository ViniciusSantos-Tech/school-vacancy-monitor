name: Matrícula Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar script
        env:          
            TOKEN: ${{ vars.TOKEN }}
            CHAT_ID: ${{ vars.CHAT_ID }}
            MATRICULA: ${{ vars.MATRICULA }}
            DATANASCIMENTO: ${{ vars.DATANASCIMENTO }}
            NOMEALUNO: ${{ vars.NOMEALUNO }}
            NOMEMAE: ${{ vars.NOMEMAE }}
            INDEXANO: ${{ vars.INDEXANO }}
            INDEXMUNICIPIO: ${{ vars.INDEXMUNICIPIO }}
            INDEXBAIRRO: ${{ vars.INDEXBAIRRO }}
        run: python main.py
